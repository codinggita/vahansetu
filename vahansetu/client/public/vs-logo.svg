<!-- 
  VAHANSETU — Animated SVG Logo Mark
  Concept: Stylized "VS" monogram fused with a charging bolt and energy bridge arcs.
  The bolt forms the negative space between V and S, while two bridge arcs 
  represent "Setu" (bridge) and connectivity. Energy particles flow along the paths.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" class="vs-logo-svg">
  <defs>
    <!-- Animated gradient for the main glow -->
    <linearGradient id="vs-grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff">
        <animate attributeName="stop-color" values="#00f0ff;#b56dff;#00ffa3;#00f0ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#b56dff">
        <animate attributeName="stop-color" values="#b56dff;#00ffa3;#00f0ff;#b56dff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00ffa3">
        <animate attributeName="stop-color" values="#00ffa3;#00f0ff;#b56dff;#00ffa3" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Cyan to purple gradient (static) -->
    <linearGradient id="vs-grad-bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#b56dff"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="vs-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Outer glow filter -->
    <filter id="vs-outer-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Energy particle -->
    <circle id="vs-particle" r="1.5" fill="#00f0ff" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
  </defs>

  <!-- OUTER RING — Rotating energy border -->
  <g class="vs-ring-group">
    <!-- Background ring -->
    <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(0,240,255,0.06)" stroke-width="1.5"/>
    
    <!-- Animated arc 1 — top right -->
    <path d="M 60 6 A 54 54 0 0 1 114 60" fill="none" stroke="url(#vs-grad-main)" stroke-width="2" stroke-linecap="round" opacity="0.7" class="vs-arc vs-arc-1"/>
    
    <!-- Animated arc 2 — bottom left -->
    <path d="M 60 114 A 54 54 0 0 1 6 60" fill="none" stroke="url(#vs-grad-main)" stroke-width="2" stroke-linecap="round" opacity="0.5" class="vs-arc vs-arc-2"/>

    <!-- Dash arc — orbiting -->
    <circle cx="60" cy="60" r="54" fill="none" stroke="url(#vs-grad-main)" stroke-width="1" stroke-dasharray="4 18" opacity="0.25" class="vs-dash-ring"/>
  </g>

  <!-- INNER HEXAGONAL FRAME (subtle) -->
  <polygon points="60,14 98,33 98,87 60,106 22,87 22,33" fill="none" stroke="rgba(0,240,255,0.08)" stroke-width="0.8" class="vs-hex"/>

  <!-- BRIDGE ARCS — The "Setu" (bridge) concept -->
  <g class="vs-bridge-arcs" filter="url(#vs-glow)">
    <!-- Top bridge arc -->
    <path d="M 30 52 Q 60 28 90 52" fill="none" stroke="url(#vs-grad-main)" stroke-width="1.8" stroke-linecap="round" opacity="0.6" class="vs-bridge-top"/>
    <!-- Bottom bridge arc -->
    <path d="M 30 72 Q 60 96 90 72" fill="none" stroke="url(#vs-grad-main)" stroke-width="1.8" stroke-linecap="round" opacity="0.4" class="vs-bridge-bottom"/>
  </g>

  <!-- MAIN LOGO MARK — "VS" with integrated bolt -->
  <g class="vs-mark" filter="url(#vs-glow)">
    <!-- V shape -->
    <path d="M 28 34 L 46 78 L 54 58" fill="none" stroke="url(#vs-grad-bolt)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" class="vs-letter-v"/>
    
    <!-- Central Lightning Bolt (the bridge between V and S) -->
    <path d="M 54 38 L 48 58 L 62 54 L 55 80" fill="none" stroke="#00f0ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="vs-bolt"/>
    
    <!-- S shape -->
    <path d="M 66 38 Q 92 38 82 54 Q 72 70 92 78" fill="none" stroke="url(#vs-grad-bolt)" stroke-width="4.5" stroke-linecap="round" class="vs-letter-s"/>
  </g>

  <!-- ENERGY FLOW PARTICLES along bridge arcs -->
  <g class="vs-particles">
    <circle r="2" fill="#00f0ff" opacity="0">
      <animateMotion path="M 30 52 Q 60 28 90 52" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;2.5;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#b56dff" opacity="0">
      <animateMotion path="M 30 52 Q 60 28 90 52" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;2;1" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" fill="#00ffa3" opacity="0">
      <animateMotion path="M 30 72 Q 60 96 90 72" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0.7;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;2;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.5" fill="#00f0ff" opacity="0">
      <animateMotion path="M 30 72 Q 60 96 90 72" dur="4s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0" dur="4s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- BOLT TIP GLOW — animated pulse at the bolt tip -->
  <circle cx="55" cy="80" r="4" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5" class="vs-bolt-pulse">
    <animate attributeName="r" values="3;8;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="80" r="2" fill="#00f0ff" opacity="0.9" class="vs-bolt-core">
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
